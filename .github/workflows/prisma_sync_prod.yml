name: Prisma Generate + DB Push (Prod)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type PUSH_DB to confirm prisma db push on prod
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: ${{ inputs.confirm != 'PUSH_DB' }}
        run: |
          echo "Confirmation failed. Type PUSH_DB to proceed."
          exit 1
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_UNPOOLED }}
